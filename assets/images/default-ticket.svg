<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset=".5" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
    <radialGradient id="glow" cx=".7" cy=".3" r=".5">
      <stop offset="0" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#tbg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <!-- Pattern -->
  <g opacity="0.08">
    <circle cx="80"  cy="80"  r="40" stroke="#fff" stroke-width="2" fill="none"/>
    <circle cx="720" cy="370" r="60" stroke="#fff" stroke-width="2" fill="none"/>
    <circle cx="640" cy="60"  r="20" stroke="#fff" stroke-width="2" fill="none"/>
  </g>
  <!-- Ticket icon -->
  <g transform="translate(400, 200)">
    <rect x="-100" y="-60" width="200" height="120" rx="14" fill="#fff" opacity="0.95"/>
    <!-- Tear line -->
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
    <text y="-15" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="900" fill="#1E40AF">BILET</text>
    <text y="35" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="600" fill="#3B82F6" letter-spacing="2">TEST</text>
  </g>
  <text x="400" y="385" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#fff" letter-spacing="1">VatanParvar Yaypan</text>
  <text x="400" y="412" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.8)" letter-spacing="3">AVTOMAKTAB · YO'L HARAKATI</text>
</svg>
