<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="qbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="qicon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
    <pattern id="pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="rgba(59,130,246,0.08)"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#qbg)"/>
  <rect width="800" height="450" fill="url(#pattern)"/>
  <!-- Question mark -->
  <g transform="translate(400, 225)">
    <circle r="80" fill="url(#qicon)" opacity="0.15"/>
    <circle r="62" fill="url(#qicon)"/>
    <text y="22" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="80" font-weight="900" fill="#fff">?</text>
  </g>
  <!-- Decorative road lines -->
  <g opacity="0.3">
    <line x1="60"  y1="380" x2="120" y2="380" stroke="#3B82F6" stroke-width="3" stroke-dasharray="8,8"/>
    <line x1="140" y1="380" x2="200" y2="380" stroke="#3B82F6" stroke-width="3" stroke-dasharray="8,8"/>
    <line x1="600" y1="380" x2="660" y2="380" stroke="#3B82F6" stroke-width="3" stroke-dasharray="8,8"/>
    <line x1="680" y1="380" x2="740" y2="380" stroke="#3B82F6" stroke-width="3" stroke-dasharray="8,8"/>
  </g>
  <text x="400" y="370" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="600" fill="#1E40AF" letter-spacing="2" opacity="0.7">VATANPARVAR YAYPAN</text>
</svg>
